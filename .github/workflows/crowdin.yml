name: Auto-merge Crowdin translations

on:
  push:
    branches:
      - l10n_main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge Crowdin branch into main
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout main
          git merge origin/l10n_main --no-ff -m "docs: update translations from Crowdin"
          git push origin main
